<div class="custom-dialog-header" style="background: #0f172a; color: white;">
  <h2 mat-dialog-title style="margin: 0; color: white;">Pago de Servicio</h2>
</div>

<mat-dialog-content class="payment-content">
  <div class="payment-summary">
    <div class="summary-row">
      <span>Taller:</span>
      <strong>{{ workshop?.name || 'AutoService Central' }}</strong>
    </div>
    <div class="summary-row">
      <span>Orden #:</span>
      <strong>{{ order?.trackingCode }}</strong>
    </div>
    <div class="summary-row total-row">
      <span>Total a Pagar:</span>
      <h2>S/ {{ order?.price | number:'1.2-2' }}</h2>
    </div>
  </div>

  <div class="payment-form mt-3">
    <div class="field">
      <label>Número de Tarjeta</label>
      <input type="text" [(ngModel)]="paymentData.cardNumber" placeholder="0000 0000 0000 0000" class="custom-form-input font-mono" maxlength="19">
    </div>

    <div class="field">
      <label>Titular de la Tarjeta</label>
      <input type="text" [(ngModel)]="paymentData.cardHolder" placeholder="Nombre como aparece en la tarjeta" class="custom-form-input">
    </div>

    <div class="double-grid">
      <div class="field">
        <label>Expiración (MM/AA)</label>
        <input type="text" [(ngModel)]="paymentData.expiryDate" placeholder="MM/AA" class="custom-form-input" maxlength="5">
      </div>
      <div class="field">
        <label>CVV</label>
        <input type="password" [(ngModel)]="paymentData.cvv" placeholder="123" class="custom-form-input" maxlength="4">
      </div>
    </div>
  </div>

  <div class="secure-badge">
    <mat-icon style="color: #16a34a; font-size: 1.2rem; width: 1.2rem; height: 1.2rem;">lock</mat-icon>
    <span>Pago seguro encriptado de extremo a extremo.</span>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end" class="dialog-footer">
  <button mat-button (click)="close()" [disabled]="isProcessing" style="color: #64748b;">Cancelar</button>
  <button mat-flat-button class="pay-btn" (click)="simulatePayment()" [disabled]="isProcessing">
    <mat-icon *ngIf="!isProcessing">payment</mat-icon>
    <mat-icon *ngIf="isProcessing" class="spin">refresh</mat-icon>
    {{ isProcessing ? 'Procesando...' : 'Pagar S/ ' + (order?.price | number:'1.2-2') }}
  </button>
</mat-dialog-actions>
