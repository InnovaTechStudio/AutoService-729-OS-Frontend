<article class="vehicle-card">
  <div class="image-wrapper">
    <img [src]="vehicle.image" [alt]="vehicle.name" class="vehicle-image" />
    <span class="status-badge custom-badge" [ngClass]="getSeverityClass(vehicle.severity)">
      {{ vehicle.status }}
    </span>
  </div>

  <div class="vehicle-content">
    <div class="vehicle-header">
      <div>
        <h3>{{ vehicle.name }}</h3>
        <p>{{ vehicle.owner }}</p>
      </div>
      <button mat-icon-button (click)="edit.emit(vehicle.raw)">
        <mat-icon style="color: #64748b;">edit</mat-icon>
      </button>
    </div>

    <div class="vehicle-meta">
      <span><mat-icon>badge</mat-icon>{{ vehicle.plate }}</span>
      <span><mat-icon>calendar_month</mat-icon>{{ vehicle.year }}</span>
      <span><mat-icon>palette</mat-icon>{{ vehicle.color }}</span>
    </div>

    <div class="vehicle-progress-container">
      <div class="progress-label">
        <span>{{ 'vehicles.card.progress' | translate }}</span>
        <strong>{{ vehicle.progress }}%</strong>
      </div>
      <mat-progress-bar mode="determinate" [value]="vehicle.progress" class="vehicle-progress"></mat-progress-bar>
    </div>

    <button mat-stroked-button class="details-button" (click)="viewDetail.emit(vehicle.raw)">
      {{ 'vehicles.card.viewDetails' | translate }}
      <mat-icon iconPositionEnd>arrow_forward</mat-icon>
    </button>
  </div>
</article>
