<article class="mechanic-card">
  <div class="avatar-wrapper">
    <div class="mechanic-avatar">{{ initials }}</div>
  </div>

  <div class="mechanic-content">
    <div class="mechanic-top">
      <div class="name-container">
        <h3>{{ mechanic.fullName }}</h3>
        <div class="tags-group">
          <span class="custom-badge badge-info">{{ mechanic.specialty }}</span>
          <span class="custom-badge" [ngClass]="capacityStatus.class">{{ capacityStatus.label }}</span>
        </div>
      </div>
    </div>

    <div class="mechanic-account" *ngIf="mechanic.email">
      <span><mat-icon>mail</mat-icon> {{ mechanic.email }}</span>
    </div>

    <div class="workload-container">
      <div class="workload-labels">
        <span><mat-icon>work</mat-icon> {{ 'mechanic.workload.label' | translate }}</span>
        <strong>{{ mechanic.currentLoad || 0 }} / {{ mechanic.maxCapacity }}</strong>
      </div>
      <mat-progress-bar mode="determinate" [value]="loadPercentage" class="workload-bar" [ngClass]="statusClass"></mat-progress-bar>
    </div>

    <div class="mechanic-actions">
      <button mat-icon-button color="primary" (click)="edit.emit(mechanic)" [matTooltip]="'actions.editProfile' | translate">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="delete.emit(mechanic)" [matTooltip]="'actions.deleteMechanic' | translate">
        <mat-icon>delete</mat-icon>
      </button>
    </div>
  </div>
</article>
