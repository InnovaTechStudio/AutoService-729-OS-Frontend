<div class="create-wo-container">
  <div class="header-section">
    <h1>{{ 'workOrders.create.title' | translate }}</h1>
    <p>{{ 'workOrders.create.description' | translate }}</p>
  </div>

  <mat-card class="form-card">
    <mat-card-content>
      <div class="form-grid">

        <div class="field">
          <label>{{ 'workOrders.create.vehicle' | translate }}</label>
          <mat-form-field appearance="outline" class="w-full">
            <mat-select [(ngModel)]="form.vehicleId" (selectionChange)="handleVehicleChange()" [placeholder]="'workOrders.create.vehiclePlaceholder' | translate">
              <mat-option *ngFor="let v of vehicleStore.vehicles()" [value]="v.id">
                {{ v.brand }} {{ v.model }} (Placa: {{ v.plate }})
              </mat-option>
            </mat-select>
          </mat-form-field>
        </div>

        <div class="field">
          <label>{{ 'workOrders.create.customer' | translate }}</label>
          <mat-form-field appearance="outline" class="w-full">
            <input matInput type="text" [ngModel]="autoCustomerName" disabled [placeholder]="'workOrders.create.customerPlaceholder' | translate">
          </mat-form-field>
        </div>

        <div class="field">
          <label>{{ 'workOrders.create.mechanic' | translate }}</label>
          <mat-form-field appearance="outline" class="w-full">
            <mat-select [(ngModel)]="form.mechanicId" [placeholder]="'workOrders.create.mechanicPlaceholder' | translate">
              <mat-option *ngFor="let m of mechanicStore.mechanics()" [value]="m.id">
                {{ m.fullName }} ({{ m.specialty }})
              </mat-option>
            </mat-select>
          </mat-form-field>
        </div>

        <div class="field">
          <label>{{ 'workOrders.create.estimatedDate' | translate }}</label>
          <mat-form-field appearance="outline" class="w-full">
            <input matInput type="date" [(ngModel)]="form.estimatedDate" [placeholder]="'workOrders.create.datePlaceholder' | translate">
          </mat-form-field>
        </div>

        <div class="field full-width mt-3">
          <label>{{ 'workOrders.create.problemDescription' | translate }}</label>
          <mat-form-field appearance="outline" class="w-full">
            <textarea matInput [(ngModel)]="form.description" rows="4" [placeholder]="'workOrders.create.problemPlaceholder' | translate"></textarea>
          </mat-form-field>
        </div>

      </div>

      <div class="actions">
        <button mat-button (click)="cancel()" class="cancel-btn">
          {{ 'actions.cancel' | translate }}
        </button>
        <button mat-flat-button color="primary" class="primary-btn" [disabled]="isSaving()" (click)="saveOrder()">
          <mat-icon *ngIf="!isSaving()">check</mat-icon>
          <mat-icon *ngIf="isSaving()" class="spin">refresh</mat-icon>
          {{ 'workOrders.create.createButton' | translate }}
        </button>
      </div>
    </mat-card-content>
  </mat-card>
</div>
